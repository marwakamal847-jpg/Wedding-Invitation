<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    
    <base href="/A-O-Wedding-Invitation/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-primary: #c5a059;
            --gold-dark: #aa771c;
            --gold-light: #fbf5b7;
            --bg-cream: #fbf9f5;
            --text-dark: #4a4135;
            --text-light: #7a6e5d;
        }

        body.lang-en .lang-ar { display: none !important; }
        body.lang-ar .lang-en { display: none !important; }
        
        body.lang-en { direction: ltr; font-family: 'Cinzel', 'Playfair Display', serif; }
        body.lang-ar { direction: rtl; font-family: 'Amiri', serif; }

        /* Prevents the sticky navbar from covering section titles when scrolling */
        #home-section, #story-section, #date-section, #venue-section, #rsvp-section {
            scroll-margin-top: 80px;
        }

        .lang-switch {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: #ffffff; padding: 8px 18px; border-radius: 25px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2); cursor: pointer;
            color: var(--gold-dark); border: 1px solid var(--gold-primary);
            display: flex; align-items: center; gap: 8px; font-weight: bold;
            font-family: 'Cinzel', serif; transition: all 0.3s ease;
        }
        .lang-switch:hover { background: var(--gold-primary); color: #ffffff; }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-cream); color: var(--text-dark); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 20px; background-image: radial-gradient(circle at center, #ffffff 0%, #f5eff0 100%);
            transition: direction 0.3s ease;
        }

        .main-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }

        .envelope-wrapper { width: 100%; max-width: 520px; height: 360px; position: relative; cursor: pointer; z-index: 50; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 50px; }
        .envelope-wrapper.hidden-envelope { opacity: 0; transform: translateY(-60px) scale(0.8); height: 0; margin: 0; pointer-events: none; }
        .envelope { width: 100%; height: 100%; background: linear-gradient(135deg, #f1eae0 0%, #dcd1b9 100%); border-radius: 4px; box-shadow: 0 30px 60px rgba(74, 65, 53, 0.3); position: relative; border: 1px solid rgba(197, 160, 89, 0.3); }
        .envelope-flap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #e3dac1 0%, #d5c8aa 100%); clip-path: polygon(0 0, 50% 55%, 100% 0); z-index: 3; transition: transform 0.6s ease; }
        .envelope-flap::after { content: 'A & O'; position: absolute; top: 12%; left: 50%; transform: translateX(-50%); font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; color: rgba(146, 114, 56, 0.5); border: 2px solid rgba(146, 114, 56, 0.3); padding: 8px 14px; border-radius: 50%; letter-spacing: 2px; }
        .wax-seal { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 75px; background: radial-gradient(circle, #e9c381 0%, #aa771c 100%); border-radius: 50%; z-index: 4; box-shadow: 0 10px 25px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; color: #ffffff; font-size: 1.5rem; border: 2px dashed rgba(255,255,255,0.2); transition: transform 0.3s ease; }
        .envelope-wrapper:hover .wax-seal { transform: translate(-50%, -50%) scale(1.1); }
        .envelope-pockets { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 2; clip-path: polygon(0 100%, 50% 52%, 100% 100%); background: linear-gradient(to top, #fbf9f6 0%, #ede6d8 100%); border-top: 1px solid rgba(197, 160, 89, 0.3); }
        .click-hint-text { position: absolute; bottom: -40px; width: 100%; text-align: center; font-size: 0.85rem; letter-spacing: 2px; color: var(--gold-dark); text-transform: uppercase; font-weight: 700; animation: bounceUpDown 1.6s infinite; }

        .invitation-card-main { width: 100%; max-width: 680px; background: #ffffff; border: 1px solid rgba(197, 160, 89, 0.25); box-shadow: 0 25px 55px rgba(197, 160, 89, 0.12); padding: 40px 30px; border-radius: 4px; text-align: center; display: none; opacity: 0; transform: translateY(40px); transition: opacity 1s ease, transform 1s ease; }
        .invitation-card-main.revealed { display: block; opacity: 1; transform: translateY(0); }
        .card-double-frame { border: 1px solid rgba(197, 160, 89, 0.35); padding: 40px 20px; position: relative; }
        .card-double-frame::before { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 2px double var(--gold-primary); pointer-events: none; }
        .top-invite-tag { font-size: 0.8rem; letter-spacing: 5px; color: var(--text-light); text-transform: uppercase; margin-bottom: 25px; }
        .basmala-text { font-size: 1.9rem; color: var(--gold-dark); margin-bottom: 20px; font-family: 'Amiri', serif; font-weight: 700; }
        .quran-verse-ar { font-family: 'Amiri', serif; font-size: 1.35rem; line-height: 2.2; color: var(--text-dark); margin-bottom: 15px; font-weight: 700; padding: 0 10px; }
        .quran-verse-en { font-size: 0.9rem; line-height: 1.8; color: var(--text-light); font-style: italic; max-width: 540px; margin: 0 auto 10px auto; font-family: 'Playfair Display', serif; }
        .quran-ref-tag { font-size: 0.75rem; letter-spacing: 2px; color: var(--gold-primary); font-weight: 700; margin-bottom: 30px; }

        .diamond-divider-line { display: flex; align-items: center; justify-content: center; margin: 25px 0; }
        .diamond-divider-line::before, .diamond-divider-line::after { content: ''; width: 50px; height: 1px; background: var(--gold-primary); }
        .diamond-divider-line i { color: var(--gold-primary); margin: 0 12px; font-size: 11px; }

        .royal-names-title { font-family: 'Cinzel Decorative', 'Amiri', serif; font-size: 2.5rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #9a7127, #dfb76c, #9a7127); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
        .celebrate-txt { font-size: 0.85rem; letter-spacing: 2px; color: var(--text-light); text-transform: uppercase; margin-bottom: 30px; }

        .wedding-date-badge-box { direction: ltr !important; display: inline-flex; flex-wrap: wrap; align-items: center; justify-content: center; border-top: 1px solid var(--gold-primary); border-bottom: 1px solid var(--gold-primary); padding: 12px 20px; font-size: 1.25rem; letter-spacing: 1px; color: var(--text-dark); margin-bottom: 25px; font-weight: 600; gap: 15px; }
        .wedding-date-badge-box i { color: var(--gold-primary); margin-right: 8px; font-size: 1.1rem; }
        .badge-separator { color: var(--gold-primary); font-weight: normal; }

        .countdown-wrapper { display: flex; flex-direction: column; align-items: center; margin: 15px 0 25px 0; }
        .countdown-container { display: flex; justify-content: center; gap: 12px; direction: ltr !important; }
        .countdown-box { background: #ffffff; border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 4px; padding: 10px; min-width: 75px; box-shadow: 0 6px 15px rgba(197, 160, 89, 0.06); display: flex; flex-direction: column; align-items: center; }
        .countdown-num { font-size: 1.5rem; font-weight: 700; color: var(--gold-dark); font-family: 'Cinzel', 'Amiri', serif; }
        .countdown-lbl { font-size: 0.72rem; color: var(--text-light); text-transform: uppercase; margin-top: 4px; font-weight: 600; }
        .countdown-finished { display: none; font-weight: bold; color: var(--gold-dark); font-size: 1.1rem; margin-top: 10px; }
