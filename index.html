<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <base href="/A-O-Wedding-Invitation/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold-primary: #c5a059; --gold-dark: #aa771c; --bg-cream: #fbf9f5; --text-dark: #4a4135; --text-light: #7a6e5d; }
        body.lang-en .lang-ar { display: none !important; }
        body.lang-ar .lang-en { display: none !important; }
        body.lang-en { direction: ltr; font-family: 'Cinzel', serif; }
        body.lang-ar { direction: rtl; font-family: 'Amiri', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-cream); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* RSVP Styles */
        .trigger-rsvp-popup-btn { background: linear-gradient(135deg, #aa771c 0%, #dfb76c 50%, #aa771c 100%); color: #ffffff; border: none; padding: 14px 40px; cursor: pointer; border-radius: 3px; }
        .trigger-rsvp-popup-btn:disabled { background: #ccc !important; cursor: not-allowed; }
        .rsvp-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 37, 30, 0.6); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .rsvp-popup-overlay.show-popup { display: flex; }
        .popup-form-box { background: #ffffff; padding: 35px; width: 90%; max-width: 420px; text-align: center; }
        .success-alert-message { color: #27ae60; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body class="lang-ar">

    <div class="main-container">
        <div class="rsvp-footer-action-area" id="rsvp-section">
            <button class="trigger-rsvp-popup-btn" id="rsvpTriggerBtn" onclick="toggleRSVPModal(true)">
                <span class="lang-ar">نعم، سأحضر بالتأكيد</span>
                <span class="lang-en">Yes, I'll Be There</span>
            </button>
        </div>
    </div>

    <div class="rsvp-popup-overlay" id="rsvpPopupOverlay">
        <div class="popup-form-box">
            <form id="weddingFormSubmit" onsubmit="handleFormSubmission(event)">
                <input type="text" id="guestFullName" placeholder="Guest Name" required style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" id="submitRsvpBtn" class="trigger-rsvp-popup-btn">Submit</button>
                <div class="success-alert-message" id="successAlertMessage">Confirmed!</div>
            </form>
        </div>
    </div>

    <script>
        // 1. Run on load: Check if already submitted
        window.onload = function() {
            if (localStorage.getItem('rsvpSubmitted') === 'true') {
                lockRSVP();
            }
        };

        // 2. The Submission Function
        function handleFormSubmission(event) {
            event.preventDefault();

            // Here you would add your AJAX/Fetch code to send data to a server
            
            // Lock the UI
            localStorage.setItem('rsvpSubmitted', 'true');
            document.getElementById('successAlertMessage').style.display = 'block';
            document.getElementById('submitRsvpBtn').disabled = true;
            
            lockRSVP();

            setTimeout(() => {
                toggleRSVPModal(false);
            }, 2000);
        }

        // 3. Helper to change button state
        function lockRSVP() {
            const btn = document.getElementById('rsvpTriggerBtn');
            btn.disabled = true;
            btn.innerText = "تم التأكيد / Confirmed";
        }

        function toggleRSVPModal(show) {
            document.getElementById('rsvpPopupOverlay').classList.toggle('show-popup', show);
        }

        // Add your existing toggleLanguage and other scripts below here...
    </script>
</body>
</html>
