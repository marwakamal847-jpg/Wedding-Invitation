<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cinzel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold-primary: #c5a059; --bg-cream: #fbf9f5; --text-dark: #4a4135; }
        
        /* نظام اللغات */
        body.lang-en { direction: ltr; font-family: 'Cinzel', serif; }
        body.lang-ar { direction: rtl; font-family: 'Amiri', serif; }
        
        /* إخفاء وإظهار النصوص حسب اللغة */
        body.lang-en .lang-ar, body.lang-ar .lang-en { display: none !important; }

        /* أيقونة تبديل اللغة */
        .lang-switch {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 10px 15px; border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
            color: var(--gold-primary); border: 1px solid var(--gold-primary);
        }

        body { background-color: var(--bg-cream); margin: 0; padding: 20px; color: var(--text-dark); transition: 0.3s; }
        .main-container { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        /* بقية التنسيقات الأصلية */
        .invitation-card { background: white; padding: 40px; border: 1px solid var(--gold-primary); text-align: center; }
    </style>
</head>
<body class="lang-ar">

    <!-- أيقونة تبديل اللغة -->
    <div class="lang-switch" onclick="toggleLanguage()">
        <i class="fa-solid fa-earth-americas"></i> 
        <span class="lang-ar">EN</span>
        <span class="lang-en">AR</span>
    </div>

    <div class="main-container">
        <div class="invitation-card">
            <h1>
                <span class="lang-ar">عبد العزيز & أمنية</span>
                <span class="lang-en">Abdelaziz & Omnia</span>
            </h1>
            <p>
                <span class="lang-ar">يسعدنا دعوتكم لحضور زفافنا</span>
                <span class="lang-en">We joyfully invite you to our wedding</span>
            </p>
        </div>
    </div>

    <script>
        function toggleLanguage() {
            const body = document.body;
            if (body.classList.contains('lang-ar')) {
                body.classList.replace('lang-ar', 'lang-en');
                document.documentElement.dir = "ltr";
                document.documentElement.lang = "en";
            } else {
                body.classList.replace('lang-en', 'lang-ar');
                document.documentElement.dir = "rtl";
                document.documentElement.lang = "ar";
            }
        }
    </script>
</body>
</html>
