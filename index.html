<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f6f0;
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #d4af37; margin-bottom: 10px; }
        p { color: #666; font-size: 1.1rem; }
        
        /* Buttons */
        .btn {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #b8952e; }

        /* Modal / Popup Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            text-align: right; /* Right-to-left layout for Arabic */
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .close-btn {
            position: absolute;
            top: 15px; left: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover { color: #333; }

        /* Form Fields */
        .input-group-field {
            margin-bottom: 20px;
        }
        .input-group-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .input-group-field input, 
        .input-group-field textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-group-field textarea {
            resize: vertical;
            height: 80px;
        }

        /* Bilingual sub-labels */
        .lang-en { display: block; font-size: 0.85rem; color: #888; font-weight: normal; }
        .lang-ar { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>دعوة زفاف 🤍 Wedding Invitation</h1>
        <p>يسعدنا حضوركم ومشاركتنا فرحتنا</p>
        
        <button class="btn" id="openModalBtn">نعم، سأحضر بالتأكيد / Yes, I will attend</button>
    </div>

    <div id="rsvpModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2 style="color: #d4af37; margin-top: 0; text-align: center;">تأكيد الحضور / RSVP</h2>
            
            <form id="rsvpForm">
                <div class="input-group-field">
                    <label>
                        <span class="lang-ar">الاسم الكامل</span>
                        <span class="lang-en">Full Name</span>
                    </label>
                    <input type="text" id="fullName" required placeholder="John Doe / محمد أحمد">
                </div>

                <div class="input-group-field">
                    <label>
                        <span class="lang-ar">عدد المرافقين</span>
                        <span class="lang-en">Number of Companions</span>
                    </label>
                    <input type="number" id="companions" min="0" value="0" required>
                </div>

                <div class="input-group-field">
                    <label>
                        <span class="lang-ar">كلمة أو تهنئة للعروسين (اختياري)</span>
                        <span class="lang-en">A note for us (optional)</span>
                    </label>
                    <textarea id="guestNote" placeholder="..."></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">إرسال / Submit</button>
            </form>
        </div>
    </div>

    <script>
        // Modal Control Elements
        const modal = document.getElementById('rsvpModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const rsvpForm = document.getElementById('rsvpForm');

        // Open Modal
        openBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // Close Modal via 'X'
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Close Modal when clicking background backdrop
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Form Submission Handling
        rsvpForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Stop standard form submission reload

            const fullName = document.getElementById('fullName').value;
            const companions = document.getElementById('companions').value;
            
            // Capturing the newly added notes value
            const note = document.getElementById('guestNote').value;

            // Output submission data to console (can be linked to your database API here)
            console.log("RSVP Submission Details:", { fullName, companions, note });

            alert('تم تسجيل حضورك بنجاح! شكرًا لك. \nYour RSVP has been submitted successfully!');
            
            // Clean up form and hide modal
            rsvpForm.reset();
            modal.style.display = 'none';
        });
    </script>
</body>
</html>
