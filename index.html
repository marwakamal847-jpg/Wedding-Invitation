        :root {
            --gold-primary: #c5a059;
            --gold-dark: #aa771c;
            --gold-light: #fbf5b7;
            --bg-cream: #fbf9f5;
            --text-dark: #4a4135;
            --text-light: #7a6e5d;
        }

        body.lang-en .lang-ar { display: none !important; }
        body.lang-ar .lang-en { display: none !important; }
        
        body.lang-en { direction: ltr; font-family: 'Cinzel', 'Playfair Display', serif; }
        body.lang-ar { direction: rtl; font-family: 'Amiri', serif; }

        #home-section, #story-section, #date-section, #venue-section, #rsvp-section {
            scroll-margin-top: 80px;
        }

        /* Fixed Language Switcher: Moves natively with layout properties */
        .lang-switch {
            position: absolute; 
            top: 20px; 
            inset-inline-start: 20px; 
            z-index: 9999;
            background: #ffffff; 
            padding: 8px 18px; 
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2); 
            cursor: pointer;
            color: var(--gold-dark); 
            border: 1px solid var(--gold-primary);
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: bold;
            font-family: 'Cinzel', serif; 
            transition: all 0.3s ease;
        }
        .lang-switch:hover { background: var(--gold-primary); color: #ffffff; }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

            position: relative;
